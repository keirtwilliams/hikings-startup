<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
</head>
<body>

    <nav class="nav-box">
        <div class="home-logo">
        <a href="#home" >
  <img src="/images/hikings_logo.png">
        </a>
      </div>
            <ul>
             <li> <a class="active" href="#home">Home</a></li>
               <li> <a href="#howitworks">How it Works</a></li>
             <li> <a  href="#aboutus">About us</a></li>
          </ul>
    
    </nav>

    <heading>
        <div class="main-heading">
            <h1>Available Porters</h1>
            <p>Showing porters ready to assist you in Iloilo.</p>
               <div class="search-container">
 <span class="material-symbols-outlined search-icon">search</span>
            <input type="text" id="search-bar" name="searchbar" placeholder="Search porters or districts...">
</div>
        </div>
    </heading>

    <main class="page-wrapper">
    <form id="record-form" class="card-form">
        <h2>Add Porter</h2>
        
        <div class="input-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. Maria Santos" required>
        </div>
        <div class="input-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" placeholder="e.g. Iloilo City" required>
        </div>  
        <div class="input-group">
            <label for="imageUrl">Profile Image</label>
            <input type="url" id="imageUrl" name="imageUrl" placeholder="Paste Image URL" required>
        </div>
        <div class="input-group">
            <label for="num">Rate in PHP</label>
            <input type="number" id="num" name="num" placeholder="0" min="0" required>
        </div>   
        <div class="input-group">
            <label for="porterRequest">Porter Link</label>
            <input type="url" id="porterRequest" name="porterRequest" placeholder="Paste Porter Link/Profile">
        </div>
        <button class="submit-btn" type="submit">Add Record</button>
    </form>
</main>

         <div id="cardsContainer">
            
      </div>
      

    <script src="script.js"></script>

</body>
</html>
